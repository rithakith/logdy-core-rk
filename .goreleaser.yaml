# .goreleaser.yaml configuration for Logdy
# For more info: https://goreleaser.com

version: 2

project_name: logdy-rk

before:
  hooks:
    - go mod tidy

builds:
  - id: logdy
    binary: logdy-rk
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - src: README.md
        dst: README.md
      - src: LICENSE
        dst: LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: rithakith
    name: logdy-core-rk

# Optional: Scoop and Homebrew can be added later if desired
